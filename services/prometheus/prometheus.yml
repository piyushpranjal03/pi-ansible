global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # System metrics from Node Exporter (CPU, memory, disk, temperature, network)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
