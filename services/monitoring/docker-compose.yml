services:
  # Prometheus — time-series metrics database, scrapes targets and stores data
  prometheus:
    image: prom/prometheus:v3
    container_name: prometheus
    restart: unless-stopped
    user: "root"
    mem_limit: 512m
    memswap_limit: 512m
    cpus: '1.0'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # Node Exporter — lightweight agent that exposes system metrics (CPU, memory, disk, temperature)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    mem_limit: 64m
    memswap_limit: 64m
    cpus: '0.25'
    command:
      - '--path.rootfs=/host'
      - '--collector.thermal_zone'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:9100/"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - /:/host:ro,rslave
    pid: host

  # Loki — log aggregation database, receives logs from Promtail
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 512m
    cpus: '1.0'
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - loki_data:/loki
      - ./loki-config.yml:/etc/loki/loki-config.yml:ro

  # Promtail — log shipping agent, tails Docker and journald logs and sends to Loki
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    mem_limit: 128m
    memswap_limit: 128m
    cpus: '0.25'
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - promtail_positions:/tmp
    depends_on:
      - loki

  # Grafana — dashboard UI for metrics (Prometheus) and logs (Loki)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    env_file:
      - .env
    mem_limit: 256m
    memswap_limit: 256m
    cpus: '0.5'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - prometheus
      - loki

volumes:
  prometheus_data:
    name: prometheus_data
  loki_data:
    name: loki_data
  grafana_data:
    name: grafana_data
  promtail_positions:
    name: promtail_positions
