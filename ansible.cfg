[defaults]
# Path to the inventory file listing target hosts
inventory = inventory/hosts.yml
# Default SSH user for connecting to targets
remote_user = piyush
# Skip SSH host key verification for easier initial setup
host_key_checking = False
# Don't create .retry files on playbook failure
retry_files_enabled = False

[privilege_escalation]
# Run all tasks with elevated privileges
become = True
# Use sudo for privilege escalation
become_method = sudo
