---
- name: Deploy Grafana, Loki, and Promtail
  hosts: all
  become: yes

  vars_files:
    - ../group_vars/grafana.yml

  vars_prompt:
    - name: grafana_admin_password
      prompt: "Enter Grafana admin password"
      default: "admin"
      private: yes

  tasks:
    # ──────────────────────────────────────────────
    # Section: Directory Setup
    # ──────────────────────────────────────────────

    - name: Create grafana directory
      ansible.builtin.file:
        path: "{{ grafana_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    # ──────────────────────────────────────────────
    # Section: Restore from Backup (if available)
    # ──────────────────────────────────────────────

    - name: Check if Restic environment file exists
      ansible.builtin.stat:
        path: /etc/restic/env
      register: restic_env

    - name: Check for existing grafana backup
      ansible.builtin.shell: |
        set -a && . /etc/restic/env && set +a
        restic snapshots --tag grafana --json
      register: grafana_snapshots
      changed_when: false
      failed_when: false
      when: restic_env.stat.exists

    - name: Check if grafana volume already has data
      ansible.builtin.shell: docker volume inspect grafana_data
      register: grafana_volume_check
      changed_when: false
      failed_when: false

    - name: Restore grafana and loki data from backup
      ansible.builtin.shell: |
        set -a && . /etc/restic/env && set +a
        restic restore latest --tag grafana --target /
        docker volume create grafana_data
        docker volume create loki_data
        docker run --rm \
          -v grafana_data:/data \
          -v /tmp/grafana-backup:/backup:ro \
          alpine tar xf /backup/grafana-data.tar -C /data
        docker run --rm \
          -v loki_data:/data \
          -v /tmp/grafana-backup:/backup:ro \
          alpine tar xf /backup/loki-data.tar -C /data
        rm -rf /tmp/grafana-backup
      when:
        - restic_env.stat.exists
        - grafana_snapshots.rc == 0
        - grafana_snapshots.stdout != "[]"
        - grafana_volume_check.rc != 0

    # ──────────────────────────────────────────────
    # Section: Network Setup
    # ──────────────────────────────────────────────

    # Shared Docker network so Grafana can reach Prometheus and Loki
    - name: Create monitoring Docker network
      community.docker.docker_network:
        name: monitoring
        state: present

    # ──────────────────────────────────────────────
    # Section: Environment and Secrets
    # ──────────────────────────────────────────────

    - name: Create Grafana .env file
      ansible.builtin.copy:
        content: |
          GRAFANA_ADMIN_PASSWORD={{ grafana_admin_password }}
        dest: "{{ grafana_dir }}/.env"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
      no_log: true

    # ──────────────────────────────────────────────
    # Section: Deploy Configuration Files
    # ──────────────────────────────────────────────

    - name: Copy Loki config
      ansible.builtin.copy:
        src: ../services/grafana/loki-config.yml
        dest: "{{ grafana_dir }}/loki-config.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    - name: Copy Promtail config
      ansible.builtin.copy:
        src: ../services/grafana/promtail-config.yml
        dest: "{{ grafana_dir }}/promtail-config.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    - name: Copy Grafana datasources provisioning
      ansible.builtin.copy:
        src: ../services/grafana/datasources.yml
        dest: "{{ grafana_dir }}/datasources.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    - name: Copy docker-compose file
      ansible.builtin.copy:
        src: ../services/grafana/docker-compose.yml
        dest: "{{ grafana_dir }}/docker-compose.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    # ──────────────────────────────────────────────
    # Section: Container Management
    # ──────────────────────────────────────────────

    - name: Pull latest images and start Grafana stack
      community.docker.docker_compose_v2:
        project_src: "{{ grafana_dir }}"
        pull: always
        state: present

    - name: Clean up dangling Docker images
      community.docker.docker_prune:
        images: yes
        images_filters:
          dangling: true

    # ──────────────────────────────────────────────
    # Section: Scheduled Backup (requires Restic playbook)
    # ──────────────────────────────────────────────

    - name: Copy grafana backup script
      ansible.builtin.copy:
        src: ../services/grafana/backup.sh
        dest: "{{ grafana_dir }}/backup.sh"
        owner: root
        group: root
        mode: "0700"
      when: restic_env.stat.exists

    - name: Create grafana backup service
      ansible.builtin.copy:
        dest: /etc/systemd/system/grafana-backup.service
        content: |
          [Unit]
          Description=Grafana and Loki Restic Backup
          After=docker.service

          [Service]
          Type=oneshot
          ExecStart={{ grafana_dir }}/backup.sh
        owner: root
        group: root
        mode: "0644"
      when: restic_env.stat.exists

    - name: Create grafana backup timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/grafana-backup.timer
        content: |
          [Unit]
          Description=Daily Grafana and Loki Backup

          [Timer]
          OnCalendar={{ grafana_backup_schedule }}
          Persistent=true

          [Install]
          WantedBy=timers.target
        owner: root
        group: root
        mode: "0644"
      when: restic_env.stat.exists

    - name: Enable and start grafana backup timer
      ansible.builtin.systemd:
        name: grafana-backup.timer
        state: started
        enabled: yes
        daemon_reload: yes
      when: restic_env.stat.exists
