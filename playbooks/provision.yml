---
- name: Provision system
  hosts: all

  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/provision.yml

  handlers:
    # Restart journald when any logging config changes
    - name: restart journald
      ansible.builtin.systemd:
        name: systemd-journald
        state: restarted

    # Restart SSH when any sshd_config setting changes
    - name: restart sshd
      ansible.builtin.systemd:
        name: ssh
        state: restarted

    # Restart Docker when daemon.json changes (picks up new logging driver config)
    - name: restart docker
      ansible.builtin.systemd:
        name: docker
        state: restarted

  tasks:
    # ──────────────────────────────────────────────
    # Section: System Updates (tag: packages)
    # ──────────────────────────────────────────────

    # Refresh the local package index so we install the latest versions
    - name: Update apt package cache
      ansible.builtin.apt:
        update_cache: yes
      tags: [packages]

    # Perform a full distribution upgrade (equivalent to apt dist-upgrade)
    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
      tags: [packages]

    # Remove packages that were installed as dependencies but are no longer needed
    - name: Remove unused packages
      ansible.builtin.apt:
        autoremove: yes
        purge: yes
      tags: [packages]

    # Delete downloaded .deb files from the local cache to free disk space
    - name: Clean apt cache
      ansible.builtin.apt:
        autoclean: yes
      tags: [packages]

    # ──────────────────────────────────────────────
    # Section: Essential Software (tag: essentials)
    # ──────────────────────────────────────────────

    # Install the configurable list of essential utility packages
    - name: Install essential packages
      ansible.builtin.apt:
        name: "{{ essential_packages }}"
        state: present
      tags: [essentials]

    # ──────────────────────────────────────────────
    # Section: Automatic Security Updates (tag: upgrades)
    # ──────────────────────────────────────────────

    # Install the packages needed for automatic security updates
    - name: Install unattended-upgrades packages
      ansible.builtin.apt:
        name:
          - unattended-upgrades
          - apt-listchanges
        state: present
      tags: [upgrades]

    # Configure how often apt runs automatic updates, downloads, and cache cleanup
    - name: Configure automatic update intervals
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "{{ unattended_update_interval }}";
          APT::Periodic::Download-Upgradeable-Packages "{{ unattended_download_interval }}";
          APT::Periodic::AutocleanInterval "{{ unattended_autoclean_interval }}";
          APT::Periodic::Unattended-Upgrade "1";
        owner: root
        group: root
        mode: "0644"
      tags: [upgrades]

    # Configure which updates to install automatically, reboot policy, and notifications
    - name: Configure unattended-upgrades policy
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        content: |
          Unattended-Upgrade::Allowed-Origins {
              "${distro_id}:${distro_codename}";
              "${distro_id}:${distro_codename}-security";
              "${distro_id}ESMApps:${distro_codename}-apps-security";
              "${distro_id}ESM:${distro_codename}-infra-security";
          };

          Unattended-Upgrade::Package-Blacklist {
          };

          Unattended-Upgrade::Automatic-Reboot "{{ unattended_auto_reboot | lower }}";
          Unattended-Upgrade::Automatic-Reboot-Time "{{ unattended_auto_reboot_time }}";
          Unattended-Upgrade::Remove-Unused-Dependencies "{{ unattended_remove_unused_deps | lower }}";
          {% if unattended_syslog_enable %}
          Unattended-Upgrade::SyslogEnable "true";
          Unattended-Upgrade::SyslogFacility "{{ unattended_syslog_facility }}";
          {% endif %}
          {% if unattended_verbose %}
          Unattended-Upgrade::Verbose "true";
          {% endif %}
        owner: root
        group: root
        mode: "0644"
      tags: [upgrades]

    # ──────────────────────────────────────────────
    # Section: Docker Installation (tag: docker)
    # ──────────────────────────────────────────────

    # Remove any pre-installed container packages that conflict with official Docker
    - name: Remove conflicting Docker packages
      ansible.builtin.apt:
        name: "{{ docker_conflicting_packages }}"
        state: absent
      tags: [docker]

    # Install prerequisites needed to add Docker's official repo
    - name: Install Docker dependencies
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
      tags: [docker]

    # Ensure the keyring directory exists for storing the GPG key
    - name: Create Docker keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      tags: [docker]

    # Download Docker's official GPG key for package verification
    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
      tags: [docker]

    # Add the official Docker apt repository using detected OS facts
    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ docker_arch_map[ansible_architecture] }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
        filename: docker
        state: present
      tags: [docker]

    # Install Docker engine and related tooling from the official repo
    - name: Install Docker packages
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: yes
      tags: [docker]

    # Ensure Docker starts on boot and is currently running
    - name: Start and enable Docker service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: yes
      tags: [docker]

    # Set default logging driver for all containers with rotation limits
    # Prevents unbounded log growth on SD cards — each container keeps max 30MB of logs
    - name: Configure Docker daemon defaults
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "log-driver": "{{ docker_log_driver }}",
            "log-opts": {
              "max-size": "{{ docker_log_max_size }}",
              "max-file": "{{ docker_log_max_file }}"
            }
          }
        owner: root
        group: root
        mode: "0644"
      notify: restart docker
      tags: [docker]

    # Add specified users to the docker group so they can run containers without sudo
    - name: Add users to docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop: "{{ docker_users }}"
      tags: [docker]

    # Detect cmdline.txt location (differs between Pi OS versions)
    # Newer Pi OS (Bookworm+) uses /boot/firmware/cmdline.txt, older uses /boot/cmdline.txt
    - name: Check cmdline.txt location
      ansible.builtin.stat:
        path: /boot/firmware/cmdline.txt
      register: firmware_cmdline
      tags: [docker]

    - name: Set cmdline.txt path
      ansible.builtin.set_fact:
        cmdline_path: "{{ '/boot/firmware/cmdline.txt' if firmware_cmdline.stat.exists else '/boot/cmdline.txt' }}"
      tags: [docker]

    # Enable cgroup memory support required by Docker on older Pi kernels
    # Without this, Docker containers can't enforce memory limits on 32-bit Pi or older 64-bit kernels
    - name: Check if cgroup memory is already configured
      ansible.builtin.shell: grep -q "cgroup_enable=memory" {{ cmdline_path }}
      register: cgroup_check
      failed_when: false
      changed_when: false
      tags: [docker]

    - name: Enable cgroup memory support for Docker
      ansible.builtin.lineinfile:
        path: "{{ cmdline_path }}"
        regexp: '^((?:(?!cgroup_enable=memory).)*?)(\s+)?$'
        line: '\1 cgroup_enable=memory cgroup_memory=1'
        backrefs: yes
      register: cmdline_updated
      when: cgroup_check.rc != 0
      tags: [docker]

    # Quick sanity check that Docker is installed and responding
    - name: Verify Docker installation
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false
      tags: [docker]

    - name: Display Docker version
      ansible.builtin.debug:
        msg: "Docker installed: {{ docker_version.stdout }}"
      tags: [docker]

    # ──────────────────────────────────────────────
    # Section: Hardware Watchdog (tag: watchdog)
    # ──────────────────────────────────────────────

    # Detect config.txt location (differs between Pi OS versions)
    # Newer Pi OS (Bookworm+) uses /boot/firmware/config.txt, older uses /boot/config.txt
    - name: Check config.txt location
      ansible.builtin.stat:
        path: /boot/firmware/config.txt
      register: firmware_config
      tags: [watchdog]

    - name: Set config.txt path
      ansible.builtin.set_fact:
        config_txt_path: "{{ '/boot/firmware/config.txt' if firmware_config.stat.exists else '/boot/config.txt' }}"
      tags: [watchdog]

    # Enable the bcm2835_wdt hardware watchdog module at boot
    # Without this, /dev/watchdog won't exist and the watchdog daemon has nothing to kick
    - name: Enable hardware watchdog in boot config
      ansible.builtin.lineinfile:
        path: "{{ config_txt_path }}"
        regexp: '^#?dtparam=watchdog'
        line: 'dtparam=watchdog=on'
      register: watchdog_boot_config
      tags: [watchdog]

    # Ensure the bcm2835_wdt kernel module loads at boot
    - name: Load watchdog kernel module on boot
      ansible.builtin.lineinfile:
        path: /etc/modules-load.d/watchdog.conf
        line: 'bcm2835_wdt'
        create: yes
        owner: root
        group: root
        mode: "0644"
      tags: [watchdog]

    # Disable systemd's built-in watchdog so it doesn't claim /dev/watchdog before
    # the watchdog daemon. Systemd's watchdog only checks if PID 1 is alive — the
    # userspace daemon is more capable (load, memory, temperature, ping checks).
    - name: Disable systemd RuntimeWatchdogSec
      ansible.builtin.lineinfile:
        path: /etc/systemd/system.conf
        regexp: '^#?RuntimeWatchdogSec='
        line: 'RuntimeWatchdogSec=0'
      tags: [watchdog]

    # Install the userspace watchdog daemon that kicks the hardware watchdog
    - name: Install watchdog package
      ansible.builtin.apt:
        name: watchdog
        state: present
      tags: [watchdog]

    # Deploy watchdog configuration with health monitoring thresholds
    - name: Configure watchdog daemon
      ansible.builtin.copy:
        dest: /etc/watchdog.conf
        content: |
          # Hardware watchdog device
          watchdog-device = /dev/watchdog
          watchdog-timeout = {{ watchdog_timeout }}

          # How often to kick the watchdog (must be less than timeout)
          interval = {{ watchdog_interval }}

          # System health monitoring thresholds
          max-load-1 = {{ watchdog_max_load }}
          min-memory = {{ watchdog_min_memory }}
          max-temperature = {{ watchdog_max_temperature }}
          temperature-sensor = /sys/class/thermal/thermal_zone0/temp

          # Network health monitoring — reboot if gateway is unreachable
          ping = {{ watchdog_ping_gateway }}

          # Tolerate failures for 120s before acting — prevents false reboots during boot
          retry-timeout = 120

          # Run as realtime process so it doesn't get starved by runaway processes
          realtime = yes
          priority = 1
        owner: root
        group: root
        mode: "0644"
      tags: [watchdog]

    # Ensure the watchdog daemon starts on boot and is currently running
    - name: Start and enable watchdog service
      ansible.builtin.systemd:
        name: watchdog
        state: started
        enabled: yes
      tags: [watchdog]

    # ──────────────────────────────────────────────
    # Section: Persistent Journald Logging (tag: logging)
    # ──────────────────────────────────────────────

    # By default Pi OS stores journal logs in memory (tmpfs) — they're lost on every reboot.
    # This section enables persistent storage so we can review logs from previous boots
    # (watchdog reboots, unattended-upgrade failures, Docker crashes, etc.)

    # Create /var/log/journal/ with the exact ownership and permissions journald requires
    # for persistent storage. Setting Storage=persistent in journald.conf is NOT sufficient on
    # its own — if this directory does not exist with owner root:systemd-journal and mode 2755
    # (the leading 2 is the setgid bit), journald silently falls back to volatile storage under
    # /run/log/journal/ (tmpfs) with no warning, and logs are wiped on every reboot.
    - name: Ensure persistent journal directory exists
      ansible.builtin.file:
        path: /var/log/journal
        state: directory
        owner: root
        group: systemd-journal
        mode: "2755"
      notify: restart journald
      tags: [logging]

    - name: Configure journald storage mode
      ansible.builtin.lineinfile:
        path: /etc/systemd/journald.conf
        regexp: '^#?Storage='
        line: 'Storage={{ journald_storage }}'
      notify: restart journald
      tags: [logging]

    - name: Configure journald max disk usage
      ansible.builtin.lineinfile:
        path: /etc/systemd/journald.conf
        regexp: '^#?SystemMaxUse='
        line: 'SystemMaxUse={{ journald_max_use }}'
      notify: restart journald
      tags: [logging]

    - name: Configure journald log retention
      ansible.builtin.lineinfile:
        path: /etc/systemd/journald.conf
        regexp: '^#?MaxRetentionSec='
        line: 'MaxRetentionSec={{ journald_max_retention }}'
      notify: restart journald
      tags: [logging]

    # Force the restart journald handler to run NOW, before we trigger the flush —
    # otherwise handlers flush at end-of-play and the flush step below would run against
    # the pre-restart journald, which has already locked itself into volatile mode for
    # this session. No-op on runs where no config change was made.
    - name: Flush handlers to apply journald changes before verification
      ansible.builtin.meta: flush_handlers
      tags: [logging]

    # Migrate runtime logs from /run/log/journal/ (tmpfs) to /var/log/journal/ and flip
    # the active write target, using the systemd-supported path.
    #
    # Why this is non-trivial: journald decides at *startup* whether to write to
    # /var/log/journal/. If the directory did not exist at the last systemd-journald
    # startup, journald locks itself into volatile/runtime mode for the entire session,
    # and a userspace `journalctl --flush` is a silent no-op. The only reliable way to
    # trigger the migration is `systemd-journal-flush.service` — the unit systemd itself
    # uses during boot, which issues the flush via the journald control socket and also
    # restarts journald so it re-evaluates its storage target.
    #
    # We `state: restarted` rather than `state: started` so the service runs *every
    # play*, not just when it was previously inactive. This is the only way to force a
    # flush on a Pi where journald has already booted into volatile mode. The service is
    # a Type=oneshot — restarting it is cheap and does not restart journald more than
    # necessary (it only reissues the flush request; journald is already running).
    - name: Trigger systemd-journal-flush to migrate logs to persistent storage
      ansible.builtin.systemd:
        name: systemd-journal-flush.service
        state: restarted
      changed_when: false
      tags: [logging]

    # Verify journald is actually persisting logs to /var/log/journal/, not silently
    # running in volatile mode. Without this check, a broken deployment (missing directory,
    # wrong ownership, invalid Storage= value) looks identical to a healthy one in the play
    # recap, and crash-time logs are lost until someone notices months later.
    #
    # We check two things:
    #   1. /var/log/journal/<machine-id>/ exists — journald creates this subdirectory
    #      the moment it starts writing persistent logs. Its absence is definitive proof
    #      that journald is still in volatile mode.
    #   2. `journalctl --header` reports a File Path under /var/log/journal/ — catches
    #      the edge case where the machine-id directory exists (from a previous successful
    #      run) but journald is currently writing to /run/log/journal/ anyway.
    - name: Read machine-id for journal directory check
      ansible.builtin.slurp:
        src: /etc/machine-id
      register: machine_id_file
      tags: [logging]

    - name: Check persistent journal directory for this machine exists
      ansible.builtin.stat:
        path: "/var/log/journal/{{ (machine_id_file.content | b64decode).strip() }}"
      register: persistent_journal_dir
      tags: [logging]

    - name: Query journald active file paths
      ansible.builtin.command: journalctl --header --quiet
      register: journald_header
      changed_when: false
      tags: [logging]

    - name: Verify journald is writing to persistent storage
      ansible.builtin.assert:
        that:
          - persistent_journal_dir.stat.exists
          - persistent_journal_dir.stat.isdir
          - "'/var/log/journal/' in journald_header.stdout"
        fail_msg: >
          journald is NOT writing persistent logs.
          Expected /var/log/journal/{{ (machine_id_file.content | b64decode).strip() }}/ to exist
          (stat result: exists={{ persistent_journal_dir.stat.exists }},
          isdir={{ persistent_journal_dir.stat.isdir | default(false) }}) AND
          `journalctl --header` to reference /var/log/journal/ (first 200 chars of output:
          "{{ journald_header.stdout[:200] }}").
          Check that /var/log/journal/ exists with owner root:systemd-journal and mode 2755,
          that Storage=persistent is set in /etc/systemd/journald.conf (no typos), and that
          systemd-journal-flush.service is enabled and ran successfully (journald locks in
          volatile mode at startup and can only be flipped by this service or a reboot).
        success_msg: >
          journald is writing persistent logs to
          /var/log/journal/{{ (machine_id_file.content | b64decode).strip() }}/.
      tags: [logging]


    # ──────────────────────────────────────────────
    # Section: System Hardening — SSH (tag: hardening)
    # ──────────────────────────────────────────────

    # Lock down SSH to prevent common attack vectors.
    # Pi OS allows root key-based login by default — we close that gap entirely.

    - name: Disable root login via SSH
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin {{ ssh_permit_root_login }}'
      notify: restart sshd
      tags: [hardening]

    - name: Disable password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication {{ ssh_password_authentication }}'
      notify: restart sshd
      tags: [hardening]

    - name: Set max authentication tries
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?MaxAuthTries'
        line: 'MaxAuthTries {{ ssh_max_auth_tries }}'
      notify: restart sshd
      tags: [hardening]

    - name: Disable empty passwords
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitEmptyPasswords'
        line: 'PermitEmptyPasswords no'
      notify: restart sshd
      tags: [hardening]

    # ──────────────────────────────────────────────
    # Section: Conditional Reboot (tag: reboot)
    # ──────────────────────────────────────────────

    # Placed at the very end so all configuration is applied before deciding whether to reboot.
    # Checks both the system-level reboot indicator (set by kernel/package updates)
    # and any registered change flags from earlier sections (boot config, cmdline).
    # NOTE: On a fresh Pi, the first run will almost always reboot due to kernel updates
    # and cgroup/watchdog boot config changes. This is expected.

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file
      tags: [reboot]

    - name: Reboot if required
      ansible.builtin.reboot:
        reboot_timeout: "{{ reboot_timeout }}"
      when: >
        reboot_required_file.stat.exists
        or (watchdog_boot_config is defined and watchdog_boot_config.changed)
        or (cmdline_updated is defined and cmdline_updated.changed)
      tags: [reboot]
