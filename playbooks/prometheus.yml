---
- name: Deploy Prometheus and Node Exporter
  hosts: all

  vars_files:
    - ../group_vars/prometheus.yml

  tasks:
    # ──────────────────────────────────────────────
    # Section: Directory Setup
    # ──────────────────────────────────────────────

    - name: Create prometheus directory
      ansible.builtin.file:
        path: "{{ prometheus_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    # ──────────────────────────────────────────────
    # Section: Restore from Backup (if available)
    # ──────────────────────────────────────────────

    - name: Check if Restic environment file exists
      ansible.builtin.stat:
        path: /etc/restic/env
      register: restic_env

    - name: Check for existing prometheus backup
      ansible.builtin.shell: |
        set -a && . /etc/restic/env && set +a
        restic snapshots --tag prometheus --json
      register: prometheus_snapshots
      changed_when: false
      failed_when: false
      when: restic_env.stat.exists

    - name: Check if prometheus volume already has data
      ansible.builtin.shell: docker volume inspect prometheus_data
      register: prometheus_volume_check
      changed_when: false
      failed_when: false

    - name: Restore prometheus data from backup
      ansible.builtin.shell: |
        set -a && . /etc/restic/env && set +a
        restic restore latest --tag prometheus --target /
        docker volume create prometheus_data
        docker run --rm \
          -v prometheus_data:/data \
          -v /tmp/prometheus-backup:/backup:ro \
          alpine tar xf /backup/prometheus-data.tar -C /data
        rm -rf /tmp/prometheus-backup
      when:
        - restic_env.stat.exists
        - prometheus_snapshots.rc == 0
        - prometheus_snapshots.stdout != "[]"
        - prometheus_volume_check.rc != 0

    # ──────────────────────────────────────────────
    # Section: Network Setup
    # ──────────────────────────────────────────────

    # Shared Docker network so Grafana can reach Prometheus and Loki
    - name: Create monitoring Docker network
      community.docker.docker_network:
        name: monitoring
        state: present

    # ──────────────────────────────────────────────
    # Section: Deploy Configuration Files
    # ──────────────────────────────────────────────

    - name: Copy prometheus config
      ansible.builtin.copy:
        src: ../services/prometheus/prometheus.yml
        dest: "{{ prometheus_dir }}/prometheus.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    - name: Copy docker-compose file
      ansible.builtin.copy:
        src: ../services/prometheus/docker-compose.yml
        dest: "{{ prometheus_dir }}/docker-compose.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    # ──────────────────────────────────────────────
    # Section: Container Management
    # ──────────────────────────────────────────────

    - name: Pull latest images and start Prometheus stack
      community.docker.docker_compose_v2:
        project_src: "{{ prometheus_dir }}"
        pull: always
        state: present

    - name: Clean up dangling Docker images
      community.docker.docker_prune:
        images: yes
        images_filters:
          dangling: true

    # ──────────────────────────────────────────────
    # Section: Scheduled Backup (requires Restic playbook)
    # ──────────────────────────────────────────────

    - name: Copy prometheus backup script
      ansible.builtin.copy:
        src: ../services/prometheus/backup.sh
        dest: "{{ prometheus_dir }}/backup.sh"
        owner: root
        group: root
        mode: "0700"
      when: restic_env.stat.exists

    - name: Create prometheus backup service
      ansible.builtin.copy:
        dest: /etc/systemd/system/prometheus-backup.service
        content: |
          [Unit]
          Description=Prometheus Restic Backup
          After=docker.service

          [Service]
          Type=oneshot
          ExecStart={{ prometheus_dir }}/backup.sh
        owner: root
        group: root
        mode: "0644"
      when: restic_env.stat.exists

    - name: Create prometheus backup timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/prometheus-backup.timer
        content: |
          [Unit]
          Description=Daily Prometheus Backup

          [Timer]
          OnCalendar={{ prometheus_backup_schedule }}
          Persistent=true

          [Install]
          WantedBy=timers.target
        owner: root
        group: root
        mode: "0644"
      when: restic_env.stat.exists

    - name: Enable and start prometheus backup timer
      ansible.builtin.systemd:
        name: prometheus-backup.timer
        state: started
        enabled: yes
        daemon_reload: yes
      when: restic_env.stat.exists
