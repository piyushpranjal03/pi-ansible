---
# Variables specific to the calibre-web playbook

# ──────────────────────────────────────────────
# Section: Calibre-Web Automated Deployment
# ──────────────────────────────────────────────

# Directory on the target host where calibre-web files are deployed
cwa_dir: "/opt/calibre-web"

# Subdirectories required by the CWA container
cwa_data_dirs:
  - config
  - ingest
  - library
  - plugins

# ──────────────────────────────────────────────
# Section: Backup Schedule
# ──────────────────────────────────────────────

# Systemd OnCalendar expression for backup frequency (default: daily at 3:30 AM)
# Offset from dockmon backup (3:00 AM) to avoid concurrent S3 uploads
cwa_backup_schedule: "*-*-* 03:30:00"
