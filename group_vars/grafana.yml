---
# Variables specific to the grafana playbook

# ──────────────────────────────────────────────
# Section: Grafana Stack Deployment
# ──────────────────────────────────────────────

# Directory on the target host where grafana stack files are deployed
grafana_dir: "/opt/grafana"

# ──────────────────────────────────────────────
# Section: Backup Schedule
# ──────────────────────────────────────────────

# Systemd OnCalendar expression for backup frequency (default: daily at 4:30 AM)
grafana_backup_schedule: "*-*-* 04:30:00"
