---
# Variables specific to the provision playbook

# ──────────────────────────────────────────────
# Section: Essential Software (tag: essentials)
# ──────────────────────────────────────────────

essential_packages:
  - vim
  - curl
  - btop

# ──────────────────────────────────────────────
# Section: Automatic Security Updates (tag: upgrades)
# ──────────────────────────────────────────────

# How often (in days) to refresh the package list
unattended_update_interval: "1"

# How often (in days) to download upgradeable packages
unattended_download_interval: "1"

# How often (in days) to purge old downloaded packages from the cache
unattended_autoclean_interval: "7"

# Whether to automatically reboot after updates that require it
unattended_auto_reboot: false

# Time of day to reboot if auto-reboot is enabled (uses target host's local timezone)
unattended_auto_reboot_time: "02:00"

# Remove packages that were automatically installed and are no longer needed after upgrades
unattended_remove_unused_deps: true

# Send unattended-upgrades output to syslog (journald) — useful for log aggregation with Loki/Grafana
unattended_syslog_enable: true

# Syslog facility to use when syslog is enabled (e.g., "daemon", "local0")
unattended_syslog_facility: "daemon"

# Enable verbose logging for more detailed output in logs
unattended_verbose: false

# ──────────────────────────────────────────────
# Section: Docker Installation (tag: docker)
# ──────────────────────────────────────────────

# Packages that conflict with official Docker and must be removed first
docker_conflicting_packages:
  - docker.io
  - docker-doc
  - docker-compose
  - podman-docker
  - containerd
  - runc

# Docker packages to install from the official repository
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

# Users to add to the docker group for rootless container management
docker_users:
  - "{{ ansible_user }}"

# Architecture mapping from ansible_architecture to Docker's expected arch string
# (aarch64 → arm64, x86_64 → amd64)
docker_arch_map:
  aarch64: arm64
  x86_64: amd64
  armv7l: armhf

# ──────────────────────────────────────────────
# Section: Hardware Watchdog (tag: watchdog)
# ──────────────────────────────────────────────

# Seconds before hardware reboot if watchdog isn't kicked (Pi max is 15)
watchdog_timeout: 15

# Reboot if 1-minute load average exceeds this value
watchdog_max_load: 24

# Reboot if free memory drops below this many pages (1 page = 4KB, 2560 pages = 10MB)
watchdog_min_memory: 2560

# Reboot if CPU temperature exceeds this value in Celsius (Pi throttles at 80-85)
watchdog_max_temperature: 85

# How often (in seconds) the daemon kicks the watchdog device — must be less than timeout
watchdog_interval: 1

# ──────────────────────────────────────────────
# Section: Persistent Journald Logging (tag: logging)
# ──────────────────────────────────────────────

# Where to store journal logs: "persistent" writes to /var/log/journal/ (survives reboots),
# "volatile" keeps logs in memory only, "auto" persists only if /var/log/journal/ already exists
journald_storage: "persistent"

# Max disk space for persistent logs — keep this reasonable on SD cards to limit write wear
journald_max_use: "1G"

# Delete logs older than this duration (e.g., "30d", "1week", "6month")
journald_max_retention: "30d"

# ──────────────────────────────────────────────
# Section: System Hardening — SSH (tag: hardening)
# ──────────────────────────────────────────────

# Block root from logging in via SSH entirely — even with keys
ssh_permit_root_login: "no"

# Force SSH key-only authentication — passwords can be brute-forced, keys can't
ssh_password_authentication: "no"

# Max failed auth attempts per connection before disconnecting
ssh_max_auth_tries: 3
